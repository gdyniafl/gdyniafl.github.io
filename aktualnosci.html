<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Aktualności | Gdynia Football League</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <link rel="shortcut icon" href="assets/images/logo-gfl.png-160x160.png" type="image/x-icon">
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    /* Twoje oryginalne style */
    html { overflow-y: scroll; }
    body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
    h1, h2, h5, .nav-link, .dropdown-item { font-family: 'Bebas Neue', sans-serif !important; text-transform: uppercase; letter-spacing: 1px; }
    .navbar { background: rgba(10, 10, 10, 0.95) !important; border-bottom: 1px solid #222; padding: 10px 0 !important; }
    .navbar-brand img { height: 4.5rem !important; }
    .page-header { padding: 140px 0 40px 0 !important; text-align: center; background: #0a0a0a; border-bottom: 1px solid #222; }
    .news-section { padding: 60px 0; }
    .news-card { background: #0f0f0f; border: 1px solid #222; border-radius: 15px; overflow: hidden; height: 100%; transition: 0.3s; }
    .news-card:hover { border-color: #44b1ff; transform: translateY(-5px); }
    .news-img { width: 100%; height: 250px; object-fit: cover; border-bottom: 1px solid #222; }
    .news-content { padding: 20px; }
    .btn-ig { display: inline-block; padding: 8px 20px; border: 1px solid #44b1ff; color: #44b1ff; text-decoration: none; border-radius: 5px; font-family: 'Bebas Neue'; font-size: 1.1rem; transition: 0.3s; }
    .btn-ig:hover { background: #44b1ff; color: #000; }
    .footer { background-color: #050505; border-top: 1px solid #222; padding: 60px 0 30px 0; color: #888; text-align: center; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="assets/images/logo-gfl.png-160x160.png" alt="GFL"></a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="aktualnosci.html" style="color: #44b1ff !important;">Aktualności</a></li>
                <li class="nav-item"><a class="nav-link" href="onas.html">O nas</a></li>
                <li class="nav-item"><a class="nav-link" href="regulamin.html">Regulamin</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="container">
        <h1 class="display-1">AKTUALNOŚCI LIGOWE</h1>
        <p style="color: #44b1ff; letter-spacing: 2px;">BĄDŹ NA BIEŻĄCO Z ŻYCIEM GFL</p>
    </div>
</section>

<section class="news-section">
    <div class="container">
        <div class="row" id="news-container">
            <p class="text-center">Ładowanie informacji z boisk...</p>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        &copy; 2026 Gdynia Football League. Design & Code: Ezi
    </div>
</footer>

<script src="assets/web/assets/jquery/jquery.min.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>

<script>
    // TWOJE POŁĄCZENIE Z ARKUSZEM NEWSY
    const newsCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbwIWnrDjc6J9nmHW8vGhMuZqSSr1X0wKPZfQ9UgZ77AM-SU0MW41ajTeEU0_uq9iX1Meg3i3s5Wrb/pub?gid=1840446675&single=true&output=csv';

    // Funkcja parsująca CSV (bezpieczna dla przecinków w opisach)
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
        });
    }

    async function loadNews() {
        try {
            const response = await fetch(newsCsvUrl);
            const text = await response.text();
            const rows = parseCSV(text).slice(1); // Pomijamy nagłówki
            
            let html = '';
            
            rows.forEach(col => {
                if (col.length < 4) return;

                const title = col[0];
                const desc = col[1];
                const img = col[2];
                const link = col[3];

                html += `
                    <div class="col-md-4 mb-4">
                        <div class="news-card">
                            <img src="${img}" class="news-img" alt="${title}" onerror="this.src='assets/images/logo-gfl.png-160x160.png'">
                            <div class="news-content">
                                <h5 class="news-title">${title}</h5>
                                <p style="color:#888; font-size:0.9rem;">${desc}</p>
                                <a href="${link}" class="btn-ig">ZOBACZ WIĘCEJ ></a>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('news-container').innerHTML = html || '<p class="text-center">Brak aktualności w tym tygodniu.</p>';
        } catch (e) {
            console.error("Błąd ładowania newsów:", e);
            document.getElementById('news-container').innerHTML = '<p class="text-center">Serwis informacyjny tymczasowo niedostępny.</p>';
        }
    }
    loadNews();
</script>
</body>
</html>
