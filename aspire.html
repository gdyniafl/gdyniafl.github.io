<div class="table-container-main">
    <div class="container">
        <div class="gfl-card">
            <div class="table-responsive-wrapper">
                <table class="gfl-table">
                    <thead>
                        <tr>
                            <th class="sticky-pos">#</th>
                            <th class="sticky-team">DRUŻYNA</th>
                            <th>M</th>
                            <th>W</th>
                            <th>R</th>
                            <th>P</th>
                            <th>BRAMKI</th>

                        </tbody>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXSEavxHPPZc6MvTMg2VIyMyIRMH8UIP2ABPkstooK253hHbW2r8JgK1O-YNHCKFW8_soBcofdVKrf/pub?gid=1101831234&single=true&output=csv';

    async function loadData() {
        try {
            const r = await fetch(csvUrl);
            const d = await r.text();
            const rows = d.split('\n').slice(1);
            let html = '';
            rows.forEach(row => {
                const col = row.split(',');
                if (col.length < 8) return;
                html += `<tr>
                    <td class="sticky-pos col-highlight" style="color:#44b1ff;">${col[0]}</td>
                    <td class="sticky-team" style="font-weight:bold;">${col[1]}</td>
                    <td>${col[2]}</td><td>${col[3]}</td><td>${col[5]}</td><td>${col[4]}</td>
                    <td>${col[6]}:${col[7]}</td>
                    <td class="col-highlight">${col[9]}</td>
                </tr>`;
            });
            document.getElementById('table-data').innerHTML = html;
        } catch (e) { console.error("Błąd ładowania"); }
    }
    loadData();
</script>
