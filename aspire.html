<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Aspire League | GFL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <link rel="shortcut icon" href="assets/images/logo-gfl.png-160x160.png" type="image/x-icon">
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
    h1, h2, .nav-link, .table-title { font-family: 'Bebas Neue', sans-serif !important; text-transform: uppercase; letter-spacing: 1px; }

    /* --- NAWIGACJA --- */
    .navbar { background: rgba(10, 10, 10, 0.95) !important; border-bottom: 1px solid #222; padding: 10px 0 !important; }
    .navbar-brand img { height: 4.5rem !important; }
    .navbar-nav { display: flex !important; align-items: center !important; flex-direction: row !important; }
    .nav-item { list-style: none !important; margin-left: 20px !important; }
    .nav-link { color: #fff !important; font-size: 1.1rem !important; white-space: nowrap !important; }
    .nav-link:hover { color: #44b1ff !important; }

    /* --- STYLIZACJA TABELI --- */
    .table-container-main { padding: 140px 0 60px 0; }
    
    .gfl-card { 
        background: #080808; 
        border-radius: 20px; 
        border: 1px solid #222; 
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        max-width: 1000px;
        margin: 0 auto;
    }

    .gfl-card-header { background: #111; padding: 20px; text-align: center; border-bottom: 1px solid #222; }
    .table-title { font-size: 2.2rem; margin: 0; color: #fff; }

    /* WRAPPER DLA PRZEWIJANIA */
    .table-responsive-wrapper {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .gfl-table { 
        width: 100%; 
        border-collapse: separate; /* Wymagane dla sticky */
        border-spacing: 0;
        color: #fff; 
        font-size: 0.95rem;
    }

    /* --- NAGŁÓWKI --- */
    .gfl-table thead th {
        background: #000;
        color: #666;
        font-family: 'Bebas Neue';
        padding: 15px 10px;
        text-transform: uppercase;
        font-weight: normal;
        font-size: 1rem;
        border-bottom: 1px solid #222;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1;
    }

    /* --- PRZYPIĘTE KOLUMNY (Sticky) --- */
    .sticky-col-1 {
        position: sticky !important;
        left: 0;
        background: #080808 !important; /* Tło musi być pełne, by inne dane pod spodem nie prześwitywały */
        z-index: 2 !important;
        width: 40px;
    }
    .sticky-col-2 {
        position: sticky !important;
        left: 40px; /* Szerokość pierwszej kolumny */
        background: #080808 !important;
        z-index: 2 !important;
        text-align: left !important;
        border-right: 1px solid #222;
    }

    .gfl-table tbody td {
        padding: 15px 10px;
        border-bottom: 1px solid #141414;
        text-align: center;
        vertical-align: middle;
    }

    .col-pos { color: #44b1ff; font-weight: bold; font-family: 'Bebas Neue'; font-size: 1.1rem; }
    .col-team { font-weight: bold; min-width: 180px; color: #fff; }
    .col-highlight { color: #44b1ff; font-weight: bold; font-family: 'Bebas Neue'; font-size: 1.2rem; }
    
    .gfl-table tr:hover td { background: #111 !important; }

    .loader { text-align: center; padding: 50px; color: #44b1ff; font-family: 'Bebas Neue'; font-size: 1.8rem; }
    .footer { padding: 40px 0; border-top: 1px solid #111; text-align: center; color: #444; }

    @media (max-width: 767px) {
        .gfl-table { min-width: 700px; } /* Gwarantuje, że będzie co przewijać w bok */
        .table-title { font-size: 1.6rem; }
        .navbar-brand img { height: 3.5rem !important; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="assets/images/logo-gfl.png-160x160.png" alt="GFL"></a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="aktualnosci.html">Aktualności</a></li>
                <li class="nav-item"><a class="nav-link" href="onas.html">O nas</a></li>
                <li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" id="rozDrop" data-bs-toggle="dropdown" style="color: #44b1ff !important;">Rozgrywki</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="elite.html">Elite League</a></li>
                        <li><a class="dropdown-item" href="challenge.html">Challenge League</a></li>
                        <li><a class="dropdown-item" href="aspire.html">Aspire League</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link" href="regulamin.html">Regulamin</a></li>
                <li class="nav-item"><a class="nav-link" href="https://forms.gle/GBsXaMQieoRt8oqYA" target="_blank" style="border: 1px solid #44b1ff; padding: 5px 15px !important; border-radius: 5px;">Zapisy</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="table-container-main">
    <div class="container">
        <div class="gfl-card">
            <div class="gfl-card-header">
                <h2 class="table-title">TABELA LIGOWA ASPIRE</h2>
            </div>
            
            <div id="loading" class="loader">POBIERANIE WYNIKÓW...</div>
            
            <div class="table-responsive-wrapper">
                <table class="gfl-table" id="league-table" style="display: none;">
                    <thead>
                        <tr>
                            <th class="sticky-col-1">#</th>
                            <th class="sticky-col-2">DRUŻYNA</th>
                            <th>M</th>
                            <th>W</th>
                            <th>R</th>
                            <th>P</th>
                            <th>BRAMKI</th>
                            <th>PKT</th>
                        </tr>
                    </thead>
                    <tbody id="table-data"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container"><h5>GDYNIA FOOTBALL LEAGUE</h5><p>© 2026 GFL | Organizator: Ezi</p></div>
</footer>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXSEavxHPPZc6MvTMg2VIyMyIRMH8UIP2ABPkstooK253hHbW2r8JgK1O-YNHCKFW8_soBcofdVKrf/pub?gid=1101831234&single=true&output=csv';

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            let html = '';
            rows.forEach(row => {
                const col = row.split(','); 
                if (col.length < 8) return; 

                html += `
                    <tr>
                        <td class="col-pos sticky-col-1">${col[0]}</td>
                        <td class="col-team sticky-col-2">${col[1]}</td>
                        <td>${col[2]}</td>
                        <td>${col[3]}</td>
                        <td>${col[5]}</td>
                        <td>${col[4]}</td>
                        <td>${col[6]}:${col[7]}</td>
                        <td class="col-highlight">${col[9]}</td>
                    </tr>
                `;
            });

            document.getElementById('table-data').innerHTML = html;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('league-table').style.display = 'table';
            
        } catch (error) {
            document.getElementById('loading').innerHTML = "BŁĄD DANYCH";
        }
    }
    loadData();
</script>

<script src="assets/web/assets/jquery/jquery.min.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
