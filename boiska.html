<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Grafik Boisk | Gdynia Football League</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <link rel="shortcut icon" href="assets/images/logo-gfl.png-160x160.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
        h1, h2, .nav-link, .league-tag, .team-name { font-family: 'Bebas Neue', sans-serif !important; text-transform: uppercase; letter-spacing: 1px; }

        /* NAWIGACJA */
        .navbar { background: rgba(10, 10, 10, 0.95) !important; border-bottom: 1px solid #222; padding: 10px 0 !important; }
        .navbar-brand img { height: 4.5rem !important; }
        .nav-item { list-style: none; margin-left: 20px; }
        .nav-link { color: #fff !important; font-size: 1.1rem !important; text-decoration: none; transition: 0.3s; }
        .nav-link:hover { color: #44b1ff !important; }

        /* NAGŁÓWEK SEKCJI */
        .grafik-header { padding: 160px 0 40px 0; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('assets/images/background-gfl.jpg'); background-size: cover; }
        .section-title { font-size: 4rem; margin-bottom: 0; color: #fff; }
        .section-subtitle { color: #44b1ff; letter-spacing: 4px; font-size: 1rem; }

        /* KARTY MECZOWE */
        .grafik-container { padding: 60px 0; background: #050505; min-height: 600px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .match-card { background: #0f0f0f; border: 1px solid #222; border-radius: 12px; padding: 25px; transition: 0.4s; position: relative; overflow: hidden; }
        .match-card:hover { border-color: #44b1ff; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(68, 177, 255, 0.1); }
        
        .league-tag { font-size: 0.8rem; color: #44b1ff; margin-bottom: 15px; display: block; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .teams-wrapper { margin: 20px 0; text-align: center; }
        .team-name { font-size: 1.6rem; line-height: 1.1; margin: 5px 0; }
        .vs-divider { color: #333; font-size: 0.7rem; margin: 10px 0; font-weight: bold; }

        .match-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #111; font-size: 0.85rem; color: #888; display: flex; justify-content: space-between; align-items: center; }
        .match-footer b { color: #fff; font-weight: normal; }
        .pitch-badge { background: #1a1a1a; color: #44b1ff; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; }

        /* FOOTER */
        .footer { background-color: #050505; border-top: 1px solid #222; padding: 40px 0; text-align: center; color: #666; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .section-title { font-size: 2.5rem; }
            .match-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="assets/images/logo-gfl.png-160x160.png" alt="GFL"></a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav" style="display: flex; flex-direction: row;">
                <li class="nav-item"><a class="nav-link" href="aktualnosci.html">Aktualności</a></li>
                <li class="nav-item"><a class="nav-link" href="onas.html">O nas</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Rozgrywki</a></li>
                <li class="nav-item"><a class="nav-link" href="boiska.html" style="color: #44b1ff !important;">Grafik Boisk</a></li>
                <li class="nav-item"><a class="nav-link" href="regulamin.html">Regulamin</a></li>
                <li class="nav-item"><a class="nav-link" href="https://forms.gle/GBsXaMQieoRt8oqYA" target="_blank" style="border: 1px solid #44b1ff; padding: 5px 15px; border-radius: 5px; margin-left: 20px;">Zapisy</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="grafik-header">
    <div class="container">
        <h1 class="section-title">GRAFIK BOISK</h1>
        <p class="section-subtitle">REZERWACJE I TERMINY SPOTKAŃ</p>
    </div>
</header>

<section class="grafik-container">
    <div class="container">
        <div class="match-grid" id="grafik-data">
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #44b1ff;">ŁADOWANIE AKTUALNEGO GRAFIKU...</div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        &copy; 2026 Gdynia Football League | Wszystkie prawa zastrzeżone.
    </div>
</footer>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRT2NjlK7JkP2frWPBST7rj14EITRyHT1_z0_aOMHsXke2HzmcOJIAKpRq_EN3AL_FH6EweAAL3xbaD/pub?gid=1994792907&single=true&output=csv';

    async function fetchGrafik() {
        const container = document.getElementById('grafik-data');
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Pomijamy nagłówek

            let html = '';
            
            if (rows.length === 0 || (rows.length === 1 && rows[0].trim() === "")) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666;">Brak potwierdzonych rezerwacji na najbliższe dni.</div>';
                return;
            }

            rows.forEach(row => {
                // Używamy prostego splita, ale uważamy na przecinki w nazwach (jeśli by były)
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 5) return;

                const liga = cols[0].replace(/"/g, '');
                const dataMeczu = cols[1].replace(/"/g, '');
                const boisko = cols[2].replace(/"/g, '');
                const team1 = cols[3].replace(/"/g, '');
                const team2 = cols[4].replace(/"/g, '');

                html += `
                    <div class="match-card">
                        <span class="league-tag">${liga}</span>
                        <div class="teams-wrapper">
                            <div class="team-name">${team1}</div>
                            <div class="vs-divider">VS</div>
                            <div class="team-name">${team2}</div>
                        </div>
                        <div class="match-footer">
                            <span>${dataMeczu}</span>
                            <span class="pitch-badge">${boisko}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ff4444;">Błąd ładowania danych. Spróbuj odświeżyć stronę.</div>';
        }
    }

    fetchGrafik();
</script>

</body>
</html>
