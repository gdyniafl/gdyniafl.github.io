    body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
    h1, h2, .nav-link, .dropdown-item, .table-title { font-family: 'Bebas Neue', sans-serif !important; text-transform: uppercase; letter-spacing: 1px; }

    .dropdown-item { color: #fff !important; font-family: 'Bebas Neue' !important; font-size: 1.1rem !important; }

    /* --- NAGŁÓWEK --- */
    .page-header { padding: 140px 0 40px 0; text-align: center; background: #0a0a0a; border-bottom: 1px solid #222; }

    /* --- TABELA (PRZYPIĘTA I ULTRA-WĄSKA) --- */
    .table-container-main { padding: 40px 0 60px 0; }
    .gfl-card { background: #080808; border-radius: 20px; border: 1px solid #222; overflow: hidden; max-width: 1000px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
    .table-responsive-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .gfl-table { width: 100%; border-collapse: separate; border-spacing: 0; color: #fff; }
    .gfl-table thead th { background: #000; color: #666; padding: 15px 5px; font-size: 0.9rem; border-bottom: 1px solid #222; text-align: center; }

    /* STICKY COLUMN LOGIC */
    .sticky-pos { position: sticky !important; left: 0; background: #080808 !important; z-index: 5; width: 35px; }
    .sticky-team { position: sticky !important; left: 35px; background: #080808 !important; z-index: 5; text-align: left !important; min-width: 130px; border-right: 1px solid #222; }

    .gfl-table tbody td { padding: 12px 5px; border-bottom: 1px solid #141414; text-align: center; }
    .col-highlight { color: #44b1ff !important; font-weight: bold; font-family: 'Bebas Neue'; font-size: 1.1rem; }
    
    /* SZEROKOŚCI KOLUMN STATYSTYK */
    .col-stat { width: 40px; }
    .col-goals { min-width: 70px; }
    .col-pkt { width: 45px; }

    .footer { padding: 40px 0; border-top: 1px solid #111; text-align: center; color: #444; }

    /* --- OPTYMALIZACJA MOBILNA (UCIĘCIE SZPAR) --- */
    @media (max-width: 767px) {
        .navbar-nav { flex-direction: column !important; background: #000; padding: 20px; width: 100%; }
        .collapse:not(.show) .navbar-nav { display: none !important; }
        .nav-item { margin: 10px 0 !important; margin-left: 0 !important; }
        .navbar-brand img { height: 3.5rem !important; }

        /* Tabela "zgnieciona" dla lepszej widoczności */
        .gfl-table { min-width: 380px !important; font-size: 0.7rem !important; }
        .gfl-table td, .gfl-table th { padding: 8px 2px !important; } 
        
        .sticky-pos { width: 25px !important; }
        .sticky-team { 
            left: 25px !important; 
            min-width: 85px !important; 
            max-width: 95px !important; 
            white-space: normal !important; /* Nazwa w 2 liniach */
            font-size: 0.7rem !important;
            padding-left: 3px !important;
        }

        .col-stat { width: 25px !important; } 
        .col-goals { min-width: 55px !important; }
        .col-pkt { width: 30px !important; }
    }
  </style>
</head>

<section class="page-header">
    <div class="container">
        <h1 class="display-1">CHALLENGE LEAGUE</h1>
        <p style="color: #44b1ff; letter-spacing: 2px;">TABELA I TERMINARZ SEZONU II</p>
    </div>
</section>

<div class="table-container-main">
    <div class="container">
        <div class="gfl-card">
            <div class="table-responsive-wrapper">
                <table class="gfl-table">
                    <thead>
                        <tr>
                            <th class="sticky-pos">#</th>
                            <th class="sticky-team">DRUŻYNA</th>
                            <th class="col-stat">M</th>
                            <th class="col-stat">W</th>
                            <th class="col-stat">R</th>
                            <th class="col-stat">P</th>
                            <th class="col-goals">BRAMKI</th>

<script src="assets/web/assets/jquery/jquery.min.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA1VRwb5jvsdnc11hxIvTd1rrKLcEhdtjtWTleu7zGUNjFvwtRv4IRP_DCg8-b_q3hkobSid_TkIT3/pub?gid=1101831234&single=true&output=csv';
    async function loadData() {
        try {
            const r = await fetch(csvUrl);
            const d = await r.text();
            let html = '';
            d.split('\n').slice(1).forEach(row => {
                const col = row.split(',');
                if (col.length < 8) return;
                html += `<tr>
                    <td class="sticky-pos col-highlight">${col[0]}</td>
                    <td class="sticky-team" style="font-weight:bold;">${col[1]}</td>
                    <td class="col-stat">${col[2]}</td>
                    <td class="col-stat">${col[3]}</td>
                    <td class="col-stat">${col[5]}</td>
                    <td class="col-stat">${col[4]}</td>
                    <td class="col-goals">${col[6]}:${col[7]}</td>
                    <td class="col-highlight col-pkt">${col[9]}</td>
                </tr>`;
            });
            document.getElementById('table-data').innerHTML = html;
        } catch (e) { console.error("Błąd"); }
    }
    loadData();
</script>
