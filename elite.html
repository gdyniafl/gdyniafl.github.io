<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Elite League - GFL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <link rel="shortcut icon" href="assets/images/logo-gfl.png-160x160.png" type="image/x-icon">
  
  <link rel="stylesheet" href="assets/web/assets/mobirise-icons2/mobirise2.css">
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/dropdown/css/style.css">
  <link rel="stylesheet" href="assets/theme/css/style.css">
  <link rel="stylesheet" href="assets/mobirise/css/mbr-additional.css" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #000; color: #fff; }
    .nav-link, .navbar-brand, .display-4, h1, h2, h3, .table-header, .round-header {
        font-family: 'Bebas Neue', sans-serif !important;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* TABELA */
    .custom-table-container { background: #111; border-radius: 15px; padding: 20px; margin-bottom: 50px; overflow-x: auto; }
    .gfl-table { width: 100%; border-collapse: separate; border-spacing: 0; white-space: nowrap; font-family: sans-serif; }
    .gfl-table th { background: #000; color: #888; padding: 15px; font-size: 0.8rem; border-bottom: 2px solid #333; }
    .gfl-table td { padding: 15px; border-bottom: 1px solid #222; text-align: center; }
    .sticky-col { position: sticky; left: 0; background: #111; z-index: 5; text-align: left !important; font-weight: bold; border-right: 1px solid #333; }
    .pts-col { font-weight: bold; color: #44b1ff; font-size: 1.1rem; }

    /* TERMINARZ */
    .round-header { background: #1a1a1a; color: #44b1ff; padding: 15px; margin: 40px 0 15px; border-radius: 8px; text-align: center; border: 1px solid #333; font-size: 1.6rem; }
    .match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; font-family: sans-serif; }
    .match-date { width: 20%; color: #666; font-size: 0.8rem; }
    .match-duel { width: 60%; display: flex; justify-content: center; gap: 15px; font-weight: bold; }
    .match-score { width: 20%; text-align: right; font-weight: bold; color: #44b1ff; }

    @media (max-width: 768px) {
        .match-row { flex-direction: column; text-align: center; gap: 5px; }
        .match-duel { flex-direction: column; gap: 2px; }
        .match-date, .match-duel, .match-score { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<section style="padding: 120px 0 60px 0;">
    <div class="container">
        <h1 class="text-center mb-5" style="font-size: 4rem;">ELITE LEAGUE</h1>
        
        <div class="custom-table-container">
            <h3 class="table-header mb-4 text-center">TABELA LIGOWA</h3>
            <table class="gfl-table">
                <thead>
                    <tr><th>#</th><th class="sticky-col">DRUŻYNA</th><th>M</th><th>W</th><th>R</th><th>P</th><th>BRAMKI</th><th>PKT</th></tr>
                </thead>
                <tbody id="tableBody"><tr><td colspan="8">Ładowanie...</td></tr></tbody>
            </table>
        </div>

        <div id="full-schedule-container">
            <h3 class="table-header text-center">TERMINARZ</h3>
            </div>
    </div>
</section>

<script>
    // 1. LINKI DO TWOICH ARKUSZY
    const urlWWW = 'TU_WKLEJ_LINK_DO_ARKUSZA_WWW_CSV'; // Do Tabeli (posortowany)
    const urlMECZE = 'TU_WKLEJ_LINK_DO_ARKUSZA_MECZE_CSV'; // Do Terminarza

    async function loadElitePage() {
        try {
            // Ładowanie Tabeli
            const resTable = await fetch(urlWWW);
            const dataTable = await resTable.text();
            const tableRows = dataTable.split('\n').slice(1);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            tableRows.forEach(row => {
                const c = row.trim().split(',');
                if(c.length >= 8) {
                    tbody.innerHTML += `<tr><td>${c[0]}</td><td class="sticky-col">${c[1]}</td><td>${c[2]}</td><td>${c[3]}</td><td>${c[5]}</td><td>${c[4]}</td><td>${c[6]}:${c[7]}</td><td class="pts-col">${c[9]}</td></tr>`;
                }
            });

            // Ładowanie Terminarza
            const resMatches = await fetch(urlMECZE);
            const dataMatches = await resMatches.text();
            const matchRows = dataMatches.split('\n').slice(1);
            const scheduleContainer = document.getElementById('full-schedule-container');
            
            let rounds = {};
            matchRows.forEach(row => {
                const c = row.trim().split(',');
                if(c.length < 6) return;
                if(!rounds[c[5]]) rounds[c[5]] = [];
                rounds[c[5]].push({ h: c[0], a: c[1], sH: c[2], sA: c[3], d: c[4] });
            });

            Object.keys(rounds).sort((a,b)=>a-b).forEach(r => {
                const date = new Date(rounds[r][0].d).toLocaleDateString('pl-PL', {day:'numeric', month:'long'});
                scheduleContainer.innerHTML += `<div class="round-header">RUNDA ${r} <span style="font-size:0.8rem; opacity:0.5; display:block;">DO ${date}</span></div>`;
                rounds[r].forEach(m => {
                    let score = m.sH !== '' ? `${m.sH}:${m.sA}` : '-:-';
                    scheduleContainer.innerHTML += `<div class="match-row"><div class="match-date">DO: ${m.d}</div><div class="match-duel"><span>${m.h}</span><span>v</span><span>${m.a}</span></div><div class="match-score">${score}</div></div>`;
                });
            });
        } catch(e) { console.error(e); }
    }
    loadElitePage();
</script>

<script src="assets/web/assets/jquery/jquery.min.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/smoothscroll/smooth-scroll.js"></script>
<script src="assets/dropdown/js/navbar-dropdown.js"></script>
<script src="assets/theme/js/script.js"></script>

</body>
</html>
