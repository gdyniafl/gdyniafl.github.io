<script>
    // LINK DO ARKUSZA ELITE
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6zRSvbBupxKJZ47n_bC8xS8YeykvK_RDFsLh1_bH86EdlJpiJqHi2UK-CllT9igY0bo82398qTX8r/pub?output=csv';

    async function loadTable() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            rows.forEach(row => {
                const cols = row.trim().split(',');
                if (cols.length >= 8) { 
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cols[0]}</td>
                        <td class="team-col">${cols[1]}</td>
                        <td>${cols[2]}</td>
                        <td>${cols[3]}</td>
                        <td>${cols[5]}</td>
                        <td>${cols[4]}</td>
                        <td>${cols[6]}:${cols[7]}</td>
                        <td class="pts-col">${cols[9]}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        } catch (error) { console.error(error); }
    }
    loadTable();
</script>
