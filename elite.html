<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Elite League | Gdynia Football League</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <link rel="shortcut icon" href="assets/images/logo-gfl.png-160x160.png" type="image/x-icon">
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    /* Twoje oryginalne style */
    html { overflow-y: scroll; }
    body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
    h1, h2, h5, .nav-link, .dropdown-item, .table-title { font-family: 'Bebas Neue', sans-serif !important; text-transform: uppercase; letter-spacing: 1px; }

    .navbar { background: rgba(10, 10, 10, 0.95) !important; border-bottom: 1px solid #222; padding: 10px 0 !important; }
    .navbar-brand img { height: 4.5rem !important; }
    .nav-link { color: #fff !important; font-size: 1.1rem !important; }
    .dropdown-menu { background-color: #111 !important; border: 1px solid #333 !important; }
    .dropdown-item { color: #fff !important; font-size: 1.1rem !important; }
    .dropdown-item:hover { background-color: #44b1ff !important; color: #000 !important; }

    .page-header { padding: 140px 0 40px 0; text-align: center; background: #0a0a0a; border-bottom: 1px solid #222; }

    .table-container-main { padding: 40px 0 30px 0; }
    .gfl-card { background: #080808; border-radius: 20px; border: 1px solid #222; overflow: hidden; max-width: 1000px; margin: 0 auto; }
    .table-responsive-wrapper { width: 100%; overflow-x: auto; }
    .gfl-table { width: 100%; border-collapse: separate; border-spacing: 0; color: #fff; }
    .gfl-table thead th { background: #000; color: #666; padding: 15px 5px; font-size: 0.9rem; border-bottom: 1px solid #222; text-align: center; }
    .sticky-pos { position: sticky !important; left: 0; background: #080808 !important; z-index: 5; width: 35px; }
    .sticky-team { position: sticky !important; left: 35px; background: #080808 !important; z-index: 5; text-align: left !important; min-width: 130px; border-right: 1px solid #222; }
    .gfl-table tbody td { padding: 12px 5px; border-bottom: 1px solid #141414; text-align: center; }
    .col-highlight { color: #44b1ff !important; font-weight: bold; font-family: 'Bebas Neue'; font-size: 1.1rem; }

    .schedule-section { padding: 40px 0 80px 0; }
    .accordion-item { background-color: #080808 !important; border: 1px solid #222 !important; margin-bottom: 10px; border-radius: 10px !important; overflow: hidden; }
    .accordion-button { background-color: #0f0f0f !important; color: #fff !important; font-family: 'Bebas Neue' !important; font-size: 1.2rem; letter-spacing: 1px; box-shadow: none !important; }
    .accordion-button:not(.collapsed) { color: #44b1ff !important; border-bottom: 1px solid #222; }
    .accordion-button::after { filter: invert(1); }
    .accordion-body { background-color: #050505; padding: 0; }
    
    .match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #111; font-size: 0.9rem; }
    .team-name { width: 40%; font-weight: 500; }
    .score-box { width: 20%; text-align: center; font-family: 'Bebas Neue'; font-size: 1.2rem; color: #44b1ff; line-height: 1.1; }
    .match-details { display: block; color: #666; font-size: 0.7rem; font-family: sans-serif; margin-top: 4px; letter-spacing: 0; }

    @media (max-width: 767px) {
        .navbar-brand img { height: 3.5rem !important; }
        .team-name { font-size: 0.8rem; }
        .gfl-table { min-width: 380px !important; font-size: 0.7rem !important; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="assets/images/logo-gfl.png-160x160.png" alt="GFL"></a>
        <div class="collapse navbar-collapse justify-content-end" id="gflNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="aktualnosci.html">Aktualności</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="rozDrop" data-bs-toggle="dropdown">Rozgrywki</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="elite.html">Elite League</a></li>
                        <li><a class="dropdown-item" href="challenge.html">Challenge League</a></li>
                        <li><a class="dropdown-item" href="aspire.html">Aspire League</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link" href="regulamin.html">Regulamin</a></li>
                <li class="nav-item"><a class="nav-link" href="https://forms.gle/GBsXaMQieoRt8oqYA" target="_blank" style="border:1px solid #44b1ff; padding:5px 15px !important; border-radius:5px;">Zapisy</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="container">
        <h1 class="display-1">ELITE LEAGUE</h1>
        <p style="color: #44b1ff; letter-spacing: 2px;">TABELA I TERMINARZ SEZONU II</p>
    </div>
</section>

<div class="table-container-main">
    <div class="container">
        <div class="gfl-card">
            <div class="table-responsive-wrapper">
                <table class="gfl-table">
                    <thead>
                        <tr>
                            <th class="sticky-pos">#</th>
                            <th class="sticky-team">DRUŻYNA</th>
                            <th class="col-stat">M</th>
                            <th class="col-stat">W</th>
                            <th class="col-stat">R</th>
                            <th class="col-stat">P</th>
                            <th class="col-goals">BRAMKI</th>
                            <th class="col-pkt">PKT</th>
                        </tr>
                    </thead>
                    <tbody id="table-data"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<section class="schedule-section">
    <div class="container">
        <h2 class="text-center mb-4">PEŁNY TERMINARZ</h2>
        <div class="accordion" id="scheduleAccordion">
            <p class="text-center">Ładowanie terminarza...</p>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container text-center">
        <div class="copyright-row">
            &copy; 2026 Gdynia Football League. Design & Code: Ezi
        </div>
    </div>
</footer>

<script src="assets/web/assets/jquery/jquery.min.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>

<script>
    // Linki do Twoich arkuszy
    const tableCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6zRSvbBupxKJZ47n_bC8xS8YeykvK_RDFsLh1_bH86EdlJpiJqHi2UK-CllT9igY0bo82398qTX8r/pub?gid=1101831234&single=true&output=csv';
    const matchesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6zRSvbBupxKJZ47n_bC8xS8YeykvK_RDFsLh1_bH86EdlJpiJqHi2UK-CllT9igY0bo82398qTX8r/pub?gid=682329859&single=true&output=csv';

    async function loadData() {
        try {
            // 1. ŁADOWANIE TABELI
            const resTable = await fetch(tableCsvUrl);
            const dataTable = await resTable.text();
            let tableHtml = '';
            dataTable.split('\n').slice(1).forEach(row => {
                const col = row.split(',');
                if (col.length < 8) return;
                tableHtml += `<tr>
                    <td class="sticky-pos col-highlight">${col[0]}</td>
                    <td class="sticky-team" style="font-weight:bold;">${col[1]}</td>
                    <td class="col-stat">${col[2]}</td>
                    <td class="col-stat">${col[3]}</td>
                    <td class="col-stat">${col[5]}</td>
                    <td class="col-stat">${col[4]}</td>
                    <td class="col-goals">${col[6]}:${col[7]}</td>
                    <td class="col-highlight col-pkt">${col[9]}</td>
                </tr>`;
            });
            document.getElementById('table-data').innerHTML = tableHtml;

            // 2. ŁADOWANIE TERMINARZA
            const resMatches = await fetch(matchesCsvUrl);
            const dataMatches = await resMatches.text();
            const rounds = {};

            // Przetwarzanie wierszy terminarza
            dataMatches.split('\n').slice(1).forEach(row => {
                const col = row.split(',');
                if (col.length < 8) return;

                // DOPASOWANIE KOLUMN NA PODSTAWIE ZRZUTU EKRANU:
                const team1 = col[0];    // GOSPODARZ (A)
                const team2 = col[1];    // GOŚĆ (B)
                const goal1 = col[2];    // GOLE GOSPODARZ (C)
                const goal2 = col[3];    // GOLE GOŚĆ (D)
                const roundNum = col[5]; // RUNDA (F) - to służy do nagłówka Kolejki
                const matchTime = col[6];// DATA I GODZINA (G)
                const stadium = col[7];  // BOISKO (H)

                if (!rounds[roundNum]) rounds[roundNum] = [];

                // Logika: Jeśli są gole, pokaż wynik, jeśli nie - pokaż VS
                const score = (goal1 !== "" && goal2 !== "") ? `${goal1} : ${goal2}` : "vs";
                
                // Formatuje informację o czasie i miejscu
                const info = (matchTime && matchTime !== "Brak rezerwacji") ? `${matchTime} | ${stadium || ''}` : "Termin do ustalenia";

                rounds[roundNum].push(`
                    <div class="match-row">
                        <span class="team-name text-end">${team1}</span>
                        <span class="score-box">
                            ${score}
                            <span class="match-details">${info}</span>
                        </span>
                        <span class="team-name">${team2}</span>
                    </div>
                `);
            });

            // Budowanie akordeonu
            let accordionHtml = '';
            const sortedRounds = Object.keys(rounds).sort((a, b) => parseInt(a) - parseInt(b));

            sortedRounds.forEach((r, index) => {
                const isOpen = index === 0 ? 'show' : '';
                const isCollapsed = index === 0 ? '' : 'collapsed';
                
                accordionHtml += `
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${isCollapsed}" type="button" data-bs-toggle="collapse" data-bs-target="#k${r}">
                                KOLEJKA ${r}
                            </button>
                        </h2>
                        <div id="k${r}" class="accordion-collapse collapse ${isOpen}" data-bs-parent="#scheduleAccordion">
                            <div class="accordion-body">
                                ${rounds[r].join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('scheduleAccordion').innerHTML = accordionHtml;

        } catch (e) { 
            console.error("Błąd ładowania danych:", e);
        }
    }
    loadData();
</script>
</body>
</html>
