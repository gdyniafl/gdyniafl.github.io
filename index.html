<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Gdynia Football League | Oficjalna Strona</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  <link rel="shortcut icon" href="assets/images/logo-gfl.png-160x160.png" type="image/x-icon">
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
    h1, h2, h3, h4, .nav-link, .stat-num, .hof-name { font-family: 'Bebas Neue', sans-serif !important; text-transform: uppercase; letter-spacing: 1px; }

    .navbar { background: rgba(10, 10, 10, 0.95) !important; border-bottom: 1px solid #222; padding: 10px 0 !important; }
    .navbar-brand img { height: 4.5rem !important; }
    .hero-section { padding: 180px 0 120px 0; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/images/background-gfl.jpg'); background-size: cover; background-position: center; }
    .hero-title { font-size: 5rem; line-height: 1; }
    .btn-audio { background: #ffc107; color: #000; font-weight: bold; border: none; padding: 12px 30px; border-radius: 5px; margin-top: 20px; }
    
    .match-center { padding: 60px 0; background: #050505; }
    .match-scroll { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 20px; }
    .match-card { min-width: 300px; background: #0f0f0f; border: 1px solid #222; border-radius: 10px; padding: 20px; }
    
    .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; margin-right: 8px; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

    .stats-bar { background: #0a0a0a; padding: 50px 0; border-top: 1px solid #111; border-bottom: 1px solid #111; }
    .stat-box { text-align: center; }
    .stat-num { font-size: 3.5rem; color: #44b1ff; line-height: 1; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="assets/images/logo-gfl.png-160x160.png" alt="GFL"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gflNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse justify-content-end" id="gflNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="aktualnosci.html">Aktualności</a></li>
                <li class="nav-item"><a class="nav-link" href="druzyny.html">Drużyny</a></li>
                <li class="nav-item"><a class="nav-link" href="regulamin.html">Regulamin</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <h1 class="hero-title">GDYNIA FOOTBALL LEAGUE</h1>
        <button class="btn-audio" onclick="playAudio()">ODSŁUCHAJ ZAPOWIEDŹ</button>
    </div>
</section>

<section class="match-center">
    <div class="container">
        <h2 class="mb-4">AKTUALNA KOLEJKA</h2>
        <div class="match-scroll" id="match-center-wrapper">
            <div style="padding: 20px; color: #44b1ff;">ŁADOWANIE TERMINARZA...</div>
        </div>
    </div>
</section>

<section class="stats-bar">
    <div class="container">
        <div class="row">
            <div class="col-4 stat-box"><div class="stat-num counter" data-target="3">0</div><div class="stat-label">Ligi</div></div>
            <div class="col-4 stat-box"><div class="stat-num counter" data-target="36">0</div><div class="stat-label">Drużyn</div></div>
            <div class="col-4 stat-box"><div class="stat-num counter" data-target="548">0</div><div class="stat-label">Graczy</div></div>
        </div>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
    const matchLinks = [
        { name: 'ELITE', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6zRSvbBupxKJZ47n_bC8xS8YeykvK_RDFsLh1_bH86EdlJpiJqHi2UK-CllT9igY0bo82398qTX8r/pub?gid=682329859&single=true&output=csv' },
        { name: 'CHALLENGE', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA1VRwb5jvsdnc11hxIvTd1rrKLcEhdtjtWTleu7zGUNjFvwtRv4IRP_DCg8-b_q3hkobSid_TkIT3/pub?gid=682329859&single=true&output=csv' },
        { name: 'ASPIRE', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXSEavxHPPZc6MvTMg2VIyMyIRMH8UIP2ABPkstooK253hHbW2r8JgK1O-YNHCKFW8_soBcofdVKrf/pub?gid=682329859&single=true&output=csv' }
    ];

    async function loadMatches() {
        const wrapper = document.getElementById('match-center-wrapper');
        const todayString = "22.05.2026"; // DZISIEJSZA DATA
        let html = '';
        try {
            const results = await Promise.all(matchLinks.map(l => fetch(l.url).then(r => r.text())));
            results.forEach((csv, idx) => {
                csv.split('\n').slice(1).forEach(row => {
                    const col = row.split(',');
                    if (col.length < 6) return;
                    const isToday = col[6] && col[6].trim().startsWith(todayString);
                    const liveBadge = isToday ? '<span class="live-dot"></span>' : '';
                    html += `<div class="match-card"><div class="league-tag">${liveBadge} ${matchLinks[idx].name} | KOLEJKA ${col[5]}</div>
                            <div class="team-row"><span>${col[0]}</span><span class="score-box">${col[2] || '-'}</span></div>
                            <div class="team-row"><span>${col[1]}</span><span class="score-box">${col[3] || '-'}</span></div>
                            <div class="match-info"><span>${col[6] || ''} | <b>${col[7] || ''}</b></span></div></div>`;
                });
            });
            wrapper.innerHTML = html;
        } catch (e) { wrapper.innerHTML = "Błąd terminarza."; }
    }

    // Liczniki
    const counters = document.querySelectorAll('.counter');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const counter = entry.target;
                const target = +counter.getAttribute('data-target');
                const updateCount = () => {
                    const current = +counter.innerText;
                    const inc = Math.ceil(target / 40);
                    if (current < target) { counter.innerText = Math.min(current + inc, target); setTimeout(updateCount, 40); }
                };
                updateCount();
                observer.unobserve(counter);
            }
        });
    }, { threshold: 0.5 });
    
    window.onload = () => { loadMatches(); counters.forEach(c => observer.observe(c)); };
</script>
</body>
</html>
